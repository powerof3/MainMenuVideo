[Settings]
;0 - Play once, 1 - Play next video, 2 - Loop current video
iPlaybackMode = 2
;Replace main menu music with the video's audio track
bPlayAudio = true
;Display video stats including elapsed time and frame rate
bDebugStats = false
;Percentage chance that a video will play on startup
fPlaybackChance = 100.000000

;Volume change (0.1 = 10%)
fVolumeStep = 0.100000


[Hotkeys]

;https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes (-1 to disable)
;Stop playback key (default: Backspace)
iStopPlaybackKey = 8
;Next video key (default: Tab)
iPlayNextKey = 9
;Volume up key (default: PageUp)
iVolumeUpKey = 33
;Volume down key (default:PageDown)
iVolumeDownKey = 34
